<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NAVEGACION</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --white: #f5f5f5;
      --gray-100: #ebebeb;
      --gray-300: #c0c0c0;
      --gray-500: #7a7a7a;
      --gray-700: #3a3a3a;
      --gray-900: #1a1a1a;
      --nav-h: 64px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--white);
      color: var(--black);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--nav-h);
      background: var(--black);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2.5rem;
      border-bottom: 1px solid var(--gray-700);
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 0.18em;
      color: var(--white);
      text-decoration: none;
      user-select: none;
    }

    .logo span {
      color: var(--gray-500);
    }

    /* desktop links */
    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }

    .nav-links a {
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gray-300);
      text-decoration: none;
      position: relative;
      padding-bottom: 4px;
      transition: color 0.25s;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      left: 0; bottom: 0;
      width: 0; height: 1px;
      background: var(--white);
      transition: width 0.3s ease;
    }

    .nav-links a:hover { color: var(--white); }
    .nav-links a:hover::after { width: 100%; }

    /* hamburger */
    .hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
    }

    .hamburger span {
      display: block;
      height: 1.5px;
      background: var(--white);
      transition: transform 0.35s ease, opacity 0.25s ease, width 0.3s ease;
      transform-origin: center;
    }

    .hamburger span:nth-child(2) { width: 70%; }

    /* open state */
    .hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; width: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    /* mobile menu */
    .mobile-menu {
      display: none;
      position: fixed;
      top: var(--nav-h);
      left: 0; right: 0;
      background: var(--black);
      border-bottom: 1px solid var(--gray-700);
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1);
      z-index: 99;
    }

    .mobile-menu.open { max-height: 320px; }

    .mobile-menu ul {
      list-style: none;
      padding: 1rem 0 1.5rem;
    }

    .mobile-menu ul li {
      border-bottom: 1px solid var(--gray-900);
    }

    .mobile-menu ul li:last-child { border-bottom: none; }

    .mobile-menu ul a {
      display: block;
      padding: 1rem 2.5rem;
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--gray-300);
      text-decoration: none;
      transition: color 0.2s, padding-left 0.25s;
    }

    .mobile-menu ul a:hover {
      color: var(--white);
      padding-left: 3rem;
    }

    /* ── MAIN ── */
    main {
      flex: 1;
      padding: 5rem 2.5rem;
    }

    .section-label {
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gray-500);
      margin-bottom: 3rem;
      font-weight: 500;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.5px;
      background: var(--gray-300);
      border: 1.5px solid var(--gray-300);
    }

    .card {
      background: var(--white);
      padding: 3.5rem 2rem 3rem;
      position: relative;
      overflow: hidden;
      cursor: default;
      transition: background 0.3s ease;
    }

    .card::before {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 3px;
      background: var(--black);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.35s ease;
    }

    .card:hover { background: var(--gray-100); }
    .card:hover::before { transform: scaleX(1); }

    .card-number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3.5rem;
      color: var(--gray-300);
      line-height: 1;
      margin-bottom: 1.2rem;
      transition: color 0.3s;
    }

    .card:hover .card-number { color: var(--black); }

    .card-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 0.08em;
      color: var(--black);
      text-transform: uppercase;
    }

    .card-line {
      width: 2rem;
      height: 1px;
      background: var(--gray-500);
      margin-top: 1rem;
      transition: width 0.35s ease, background 0.3s;
    }

    .card:hover .card-line {
      width: 4rem;
      background: var(--black);
    }

    /* ── FOOTER ── */
    footer {
      background: var(--gray-900);
      border-top: 1px solid var(--gray-700);
      padding: 2rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .footer-copy {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      color: var(--gray-500);
      text-transform: uppercase;
    }

    .footer-social {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gray-500);
      text-decoration: none;
      transition: color 0.25s;
    }

    .footer-social:hover { color: var(--white); }

    .footer-social svg {
      width: 15px; height: 15px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .cards-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 640px) {
      nav { padding: 0 1.5rem; }

      .nav-links { display: none; }

      .hamburger { display: flex; }

      .mobile-menu { display: block; }

      main { padding: 3rem 1.5rem; }

      .cards-grid { grid-template-columns: 1fr; }

      .card { padding: 2.5rem 1.5rem 2rem; }

      footer { padding: 1.5rem; flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="#" class="logo">NAV<span>·</span>EGACION</a>

    <ul class="nav-links">
      <li><a href="#inicio">Inicio</a></li>
      <li><a href="#nosotros">Nosotros</a></li>
      <li><a href="#productos">Productos</a></li>
      <li><a href="#contacto">Contacto</a></li>
    </ul>

    <button class="hamburger" id="hamburger" aria-label="Abrir menú">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- MOBILE MENU -->
  <div class="mobile-menu" id="mobileMenu">
    <ul>
      <li><a href="#inicio" class="nav-mobile-link">Inicio</a></li>
      <li><a href="#nosotros" class="nav-mobile-link">Nosotros</a></li>
      <li><a href="#productos" class="nav-mobile-link">Productos</a></li>
      <li><a href="#contacto" class="nav-mobile-link">Contacto</a></li>
    </ul>
  </div>

  <!-- MAIN -->
  <main>
    <p class="section-label">Secciones principales</p>
    <div class="cards-grid">

      <div class="card" id="inicio">
        <div class="card-number">01</div>
        <div class="card-title">Inicio</div>
        <div class="card-line"></div>
      </div>

      <div class="card" id="nosotros">
        <div class="card-number">02</div>
        <div class="card-title">Nosotros</div>
        <div class="card-line"></div>
      </div>

      <div class="card" id="productos">
        <div class="card-number">03</div>
        <div class="card-title">Productos</div>
        <div class="card-line"></div>
      </div>

      <div class="card" id="contacto">
        <div class="card-number">04</div>
        <div class="card-title">Contacto</div>
        <div class="card-line"></div>
      </div>

    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    <span class="footer-copy">&copy; 2026 Navegacion — Todos los derechos reservados</span>
    <a href="https://instagram.com" target="_blank" class="footer-social">
      <svg viewBox="0 0 24 24">
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
        <circle cx="12" cy="12" r="4"/>
        <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/>
      </svg>
      @navegacion
    </a>
  </footer>

  <script>
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');
    const mobileLinks = document.querySelectorAll('.nav-mobile-link');

    hamburger.addEventListener('click', () => {
      const isOpen = mobileMenu.classList.toggle('open');
      hamburger.classList.toggle('open', isOpen);
      hamburger.setAttribute('aria-expanded', isOpen);
    });

    mobileLinks.forEach(link => {
      link.addEventListener('click', () => {
        mobileMenu.classList.remove('open');
        hamburger.classList.remove('open');
        hamburger.setAttribute('aria-expanded', false);
      });
    });

    // Cierra menú al hacer clic fuera
    document.addEventListener('click', (e) => {
      if (!hamburger.contains(e.target) && !mobileMenu.contains(e.target)) {
        mobileMenu.classList.remove('open');
        hamburger.classList.remove('open');
      }
    });
  </script>
</body>
</html>
