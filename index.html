<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"content="width=device-width, initial-scale=1.0">
  <title>JC Restaurant</title>
  <style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Helvetica Neue', sans-serif;
}

.container {
  width: 90%;
  max-width: 1200px;
  margin: auto;
}

/* NAV */
.header {
  position: fixed;
  width: 100%;
  background: #111;
  z-index: 100;
}

.nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  height: 70px;
  color: white;
}

.logo {
  font-weight: bold;
  letter-spacing: 2px;
}

.menu a {
  color: white;
  text-decoration: none;
  margin-left: 20px;
}

.menu-toggle {
  display: none;
  font-size: 26px;
  cursor: pointer;
}

  .menu a {
    padding: 15px;
    border-bottom: 1px solid #333;
  }

  .menu-toggle {
    display: block;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .menu {
    display: none;
    position: absolute;
    top: 70px;
    right: 0;
    background: #111;
    flex-direction: column;
    width: 200px;
  }
  
</style>
</head>
<body>

  <!-- NAVBAR -->
  <header class="header">
    <div class="container nav">
      <div class="logo">JC RESTAURANT</div>
      <nav class="menu">
        <a href="#">Inicio</a>
        <a href="#">Quiénes Somos</a>
        <a href="#">Menú</a>
        <a href="#">Recintos</a>
        <a href="#footer-botm">Contacto</a>
      </nav>
      <div class="menu-toggle" id="menuToggle">☰</div>
    </div>
  </header>
</body>
</html>
<script>
const toggle = document.getElementById('menuToggle');
const menu = document.querySelector('.menu');

toggle.addEventListener('click', () => {
  menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
});
