<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Básico - Práctica</title>
    <style>        
/* Paleta: Blanco #FFFFFF, Azul #007BFF, Gris #6C757D */
body {
    font-family: 'Segoe UI', sans-serif;
    background-color: #f4f4f4;
    color: #333;
    margin: 0;
}
/* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--nav-h);
      background: var(--black);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2.5rem;
      border-bottom: 1px solid var(--gray-500);
    }
    .logo {
      font-family: 'Helvetica', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 0.18em;
      color: var(--white);
      text-decoration: none;
      user-select: none;
    }
    .logo span {
      color: var(--gray-500);
    }
    /* hamburger */
    .hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
    }
    .hamburger span {
      display: block;
      height: 1.5px;
      background: var(--white);
      transition: transform 0.35s ease, opacity 0.25s ease, width 0.3s ease;
      transform-origin: center;
    }
    .hamburger span:nth-child(2) { width: 80%; }
    
    /* open state X animacion */
    .hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; width: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }
    
     /* desktop links */
    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }
    .nav-links a {
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--white);
      text-decoration: none;
      position: relative;
      padding-bottom: 4px;
      transition: color 0.25s;
    }
    
    /* mobile menu */
    .mobile-menu {
      display: none;
      position: fixed;
      top: var(--nav-h);
      left: 0; right: 0;
      background: var(--black);
      border-bottom: 1px solid var(--gray-500);
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1);
      z-index: 99;
    }
     .mobile-menu.open { max-height: 208px; }
     
     .mobile-menu ul {
      list-style: none;
      padding: 1rem 0 1.5rem;
    }
    
    .mobile-menu ul li {
      border-bottom: 1px solid var(--gray-500);
    }
    
    mobile-menu ul li:last-child { border-bottom: none; }
    
    .mobile-menu ul a {
      display: block;
      padding: 1rem 2.5rem;
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--gray-500);
      text-decoration: none;
      transition: color 0.2s, padding-left 0.25s;
    }
    
     .mobile-menu ul a:hover {
      color: var(--white);
      padding-left: 4rem;
    }
    
    @media (max-width: 640px) {
      nav { padding: 0 1.5rem; }
      .nav-links { display: none; }
      .hamburger { display: flex; }
      .mobile-menu { display: block; }
       
        
 
/* --- Estilos para Escritorio (Base) --- */
.menu-toggle {
    display: none; /* Oculto en PC */
    flex-direction: column;
    cursor: pointer;
    gap: 5px;
    background: none;
    border: none;
}

.container {
    padding: 2rem 5%;
    max-width: 800px;
    margin: auto;
}

.card {
    background: white;
    padding: 2rem;
    margin-bottom: 1.5rem;
    border-radius: 8px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}

        
</style>
</head>
<body>
<!-- NAV -->
  <nav>
    <a href="#" class="logo">LOGO JC</a>
      
      <ul class="nav-links">
        <li><a href="#inicio">Inicio</a></li>
        <li><a href="#nosotros">Nosotros</a></li>
        <li><a href="#productos">Productos</a></li>
        <li><a href="#contacto">Contacto</a></li>
      </ul>
      
      <button class="hamburger" id="hamburger" aria-label="Abrir menú">
      <span></span><span></span><span></span>
    </button>
  </nav>
  
  <!--MOBILE MENU-->  
   <div class="mobile-menu" id="mobileMenu">
    <ul>
      <li><a href="#inicio" class="nav-mobile-link">Inicio</a></li>
      <li><a href="#nosotros" class="nav-mobile-link">Nosotros</a></li>
      <li><a href="#productos" class="nav-mobile-link">Productos</a></li>
      <li><a href="#contacto" class="nav-mobile-link">Contacto</a></li>
    </ul>
  </div>
    
    <main class="container">
        <!-- Sección de Botones (Acciones) -->
        <section class="card">
            <h2>Interactividad con Botones</h2>
            <p>Contador actual: <span id="contador">0</span></p>
            <div class="btn-group">
                <button id="btnSumar" class="btn-primary">Sumar +1</button>
                <button id="btnReiniciar" class="btn-outline">Reiniciar</button>
            </div>
        </section>

        <!-- Sección de Formulario (Eventos de Input) -->
        <section class="card">
            <h2>Formulario Dinámico</h2>
            <form id="miFormulario">
                <input type="text" id="nombreInput" placeholder="Escribe tu nombre..." required>
                <button type="submit" class="btn-primary">Enviar</button>
            </form>
            <p id="mensajeBienvenida" class="hidden"></p>
        </section>
    </main>

<script>          
 const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');
    const mobileLinks = document.querySelectorAll('.nav-mobile-link');

    hamburger.addEventListener('click', () => {
      const isOpen = mobileMenu.classList.toggle('open');
      hamburger.classList.toggle('open', isOpen);
      hamburger.setAttribute('aria-expanded', isOpen);
    });
   
    mobileLinks.forEach(link => {
      link.addEventListener('click', () => {
        mobileMenu.classList.remove('open');
        hamburger.classList.remove('open');
        hamburger.setAttribute('aria-expanded', false);
      });
    });

    // Cierra menú al hacer clic fuera
    document.addEventListener('click', (e) => {
      if (!hamburger.contains(e.target) && !mobileMenu.contains(e.target)) {
        mobileMenu.classList.remove('open');
        hamburger.classList.remove('open');
      }
    });

// 2. Lógica del Contador (Acciones Básicas)
let cuenta = 0;
const txtContador = document.getElementById('contador');
const btnSumar = document.getElementById('btnSumar');
const btnReiniciar = document.getElementById('btnReiniciar');

btnSumar.addEventListener('click', () => {
    cuenta++;
    txtContador.textContent = cuenta;
    txtContador.style.color = "#007BFF"; // Cambio de estilo dinámico
});

btnReiniciar.addEventListener('click', () => {
    cuenta = 0;
    txtContador.textContent = cuenta;
    txtContador.style.color = "#333";
});

// 3. Lógica del Formulario (Evento Submit)
const formulario = document.getElementById('miFormulario');
const mensaje = document.getElementById('mensajeBienvenida');

formulario.addEventListener('submit', (e) => {
    e.preventDefault(); // Evita que la página se recargue
    const nombre = document.getElementById('nombreInput').value;
    
    mensaje.textContent = `¡Qué onda, ${nombre}! Bienvenido al código.`;
    mensaje.style.display = "block";
    mensaje.style.marginTop = "15px";
    
    formulario.reset(); // Limpia el input
 });
});
</script>
</body>
</html>
